services:
  - type: web
    name: leadsync-api
    env: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: WHATSAPP_VERIFY_TOKEN
        generateValue: true
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
