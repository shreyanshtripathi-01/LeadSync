<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadSync - Webhook Tester</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: #010409;
      padding: 16px 24px;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      color: #e6edf3;
    }
    .badge {
      background: rgba(46, 160, 67, 0.15);
      color: #3fb950;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(46, 160, 67, 0.4);
    }
    .main-content {
      display: flex;
      flex: 1;
      padding: 24px;
      gap: 24px;
      overflow: hidden;
    }
    .panel {
      border: 1px solid #30363d;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* WhatsApp Simulator Panel */
    .chat-panel {
      flex: 1;
      max-width: 450px;
      background: #efeae2; /* WhatsApp Web chat background */
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    /* WhatsApp Header */
    .chat-header {
      background: #f0f2f5;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid #d1d7db;
      z-index: 2;
    }
    .chat-header .avatar {
      width: 40px;
      height: 40px;
      background: #dfe5e7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .chat-header .avatar svg {
      width: 20px;
      height: 20px;
      fill: #ffffff;
    }
    .chat-header .info {
      display: flex;
      flex-direction: column;
    }
    .chat-header .info .name {
      color: #111b21;
      font-weight: 500;
      font-size: 16px;
    }
    .chat-header .info .status {
      color: #667781;
      font-size: 13px;
    }

    /* WhatsApp Chat Body */
    .chat-body {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      /* Subtle WhatsApp doodle background approximation */
      background-image: radial-gradient(#d1d7db 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .message {
      max-width: 75%;
      padding: 6px 7px 8px 9px;
      border-radius: 7.5px;
      font-size: 14.2px;
      line-height: 19px;
      position: relative;
      color: #111b21;
      box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
    }
    .msg-user {
      background: #d9fdd3;
      align-self: flex-end;
      border-top-right-radius: 0;
    }
    .msg-user::before {
      content: "";
      position: absolute;
      top: 0;
      right: -8px;
      width: 8px;
      height: 13px;
      background: linear-gradient(135deg, #d9fdd3 0%, #d9fdd3 50%, transparent 50%, transparent);
    }
    .msg-bot {
      background: #ffffff;
      align-self: flex-start;
      border-top-left-radius: 0;
    }
    .msg-bot::before {
      content: "";
      position: absolute;
      top: 0;
      left: -8px;
      width: 8px;
      height: 13px;
      background: linear-gradient(-135deg, #ffffff 0%, #ffffff 50%, transparent 50%, transparent);
    }
    .msg-time {
      font-size: 11px;
      color: #667781;
      float: right;
      margin: 10px 0 -5px 10px;
    }

    /* WhatsApp Input Area */
    .chat-input-container {
      background: #f0f2f5;
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    input[type="text"] {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      background: #ffffff;
      color: #111b21;
      outline: none;
    }
    input[type="text"]::placeholder {
      color: #8696a0;
    }
    .send-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      color: #54656f;
    }
    .send-btn:hover {
      color: #00a884;
    }

    /* Developer Logs Panel (Dark Mode) */
    .logs-panel {
      flex: 1.5;
      background: #010409;
    }
    .panel-header-dark {
      padding: 14px 16px;
      border-bottom: 1px solid #30363d;
      font-weight: 600;
      font-size: 14px;
      color: #8b949e;
      background: #0d1117;
    }
    .logs-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      color: #8b949e;
      font-family: Consolas, Monaco, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .log-line { margin-bottom: 6px; }
    .log-time-dev { color: #6e7681; margin-right: 10px; }
    .level-info { color: #58a6ff; font-weight: 600; }
    .level-warn { color: #d29922; font-weight: 600; }
    .level-error { color: #f85149; font-weight: 600; }
    .log-msg { color: #e6edf3; margin-left: 5px; }
    .log-meta { color: #8b949e; display: block; margin-left: 115px; margin-top: 2px;}
  </style>
</head>
<body>
  <header>
    <h1>LeadSync System Console</h1>
    <span class="badge">Webhook Listener Active</span>
  </header>
  
  <div class="main-content">
    <!-- WhatsApp Simulator -->
    <div class="panel chat-panel">
      <div class="chat-header">
        <div class="avatar">
          <!-- Default person SVG -->
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <div class="info">
          <span class="name">LeadSync Support</span>
          <span class="status">online</span>
        </div>
      </div>
      
      <div class="chat-body" id="chatContainer">
        <div class="message msg-bot">
          Hi there! I am the LeadSync Assistant. Send a test message to trigger the webhook.
          <span class="msg-time">10:00 AM</span>
        </div>
      </div>
      
      <div class="chat-input-container">
        <input type="text" id="messageInput" placeholder="Type a message">
        <button class="send-btn" id="sendBtn">
          <!-- Send Icon SVG -->
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
      </div>
    </div>

    <!-- Server Logs -->
    <div class="panel logs-panel">
      <div class="panel-header-dark">Live Server Logs</div>
      <div class="logs-body" id="logsContainer">
        <div class="log-line">
          <span class="log-time-dev">[System]</span>
          <span class="level-info">INFO</span> 
          <span class="log-msg">Waiting for incoming POST /api/webhook requests...</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const logsContainer = document.getElementById('logsContainer');

    function getFormattedTime() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Subscribe to SSE Logs
    const eventSource = new EventSource('/api/logs');
    eventSource.onmessage = (event) => {
      const log = JSON.parse(event.data);
      appendLog(log);
      
      // If the log is the simulated WhatsApp dispatch, show it in the chat
      if (log.message === 'WhatsApp message sent successfully' || log.message === 'WhatsApp access token is missing. Simulating message send.') {
         appendChat(log.text || 'Simulated API reply via LLM', 'bot');
      }
    };

    function appendLog(log) {
      const div = document.createElement('div');
      div.className = 'log-line';
      const time = new Date(log.timestamp).toLocaleTimeString();
      
      let metaStr = '';
      const { level, message, timestamp, ...meta } = log;
      if (Object.keys(meta).length > 0) {
        metaStr = `<span class="log-meta">${JSON.stringify(meta)}</span>`;
      }

      div.innerHTML = `
        <span class="log-time-dev">[${time}]</span>
        <span class="level-${level}">${level.toUpperCase()}</span> 
        <span class="log-msg">${message}</span>
        ${metaStr}
      `;
      
      logsContainer.appendChild(div);
      logsContainer.scrollTop = logsContainer.scrollHeight;
    }

    function appendChat(text, sender) {
      const div = document.createElement('div');
      div.className = `message msg-${sender}`;
      div.innerHTML = `${text.replace(/\n/g, '<br>')} <span class="msg-time">${getFormattedTime()}</span>`;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      messageInput.value = '';
      
      appendChat(text, 'user');
      
      // Send mock webhook payload
      const payload = {
        object: 'whatsapp_business_account',
        entry: [{
          changes: [{
            value: {
              metadata: { phone_number_id: '1234567890' },
              messages: [{ from: '919876543210', text: { body: text } }]
            }
          }]
        }]
      };

      try {
        await fetch('/api/webhook', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (e) {
        console.error(e);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
