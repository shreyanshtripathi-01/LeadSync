<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadSync | Systems Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --bg-panel: #0a0a0a;
      --bg-hover: #111111;
      --border: #333333;
      --text-main: #ededed;
      --text-muted: #a1a1aa;
      --accent: #ffffff;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f5a623;
      --font-sans: 'Geist', -apple-system, sans-serif;
      --font-mono: 'Geist Mono', monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
    }
    header h1 {
      font-size: 14px;
      font-weight: 500;
      margin: 0;
      letter-spacing: -0.02em;
    }

    /* Layout */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: 32px;
      gap: 32px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Left: WhatsApp Simulator */
    .chat-panel {
      flex: 1;
      max-width: 400px;
    }
    
    .chat-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header .avatar {
      width: 32px;
      height: 32px;
      background: var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-header .info { display: flex; flex-direction: column; }
    .chat-header .info .name { font-size: 13px; font-weight: 500; }
    .chat-header .info .status { font-size: 11px; color: var(--success); }

    .chat-body {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      position: relative;
    }
    .msg-user {
      background: var(--text-main);
      color: var(--bg);
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    .msg-bot {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      color: var(--text-main);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .msg-time {
      font-size: 10px;
      opacity: 0.7;
      display: block;
      margin-top: 4px;
      text-align: right;
    }

    .chat-input {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }
    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 6px;
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 13px;
      outline: none;
    }
    input[type="text"]:focus { border-color: #555; }
    .send-btn {
      background: var(--text-main);
      color: var(--bg);
      border: none;
      padding: 0 16px;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .send-btn:hover { background: #d4d4d8; }

    /* Right: Server Logs */
    .logs-panel {
      flex: 1.5;
    }
    .term-head {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }
    .term-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.7;
    }
    .log-line { display: flex; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }
    .t-time { color: #52525b; white-space: nowrap; }
    .l-info { color: #60a5fa; }
    .l-warn { color: var(--warning); }
    .l-error { color: var(--danger); }
    .t-msg { color: #d4d4d8; }
    .t-meta { color: #71717a; font-size: 11px; width: 100%; padding-left: 115px; }

  </style>
</head>
<body>
  <header>
    <h1>LeadSync / Webhook Console</h1>
    <div style="font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 8px;">
      <span style="display:inline-block; width:8px; height:8px; background:var(--success); border-radius:50%; box-shadow: 0 0 10px var(--success);"></span>
      Listener Active
    </div>
  </header>
  
  <div class="layout">
    <div class="panel chat-panel">
      <div class="chat-header">
        <div class="avatar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div class="info">
          <span class="name">LLM Support Agent</span>
          <span class="status">● active</span>
        </div>
      </div>
      
      <div class="chat-body" id="chatContainer">
        <div class="message msg-bot">
          System initialized. Send a payload to trigger the inbound webhook.
          <span class="msg-time">10:00 AM</span>
        </div>
      </div>
      
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Enter message payload...">
        <button class="send-btn" id="sendBtn">POST</button>
      </div>
    </div>

    <div class="panel logs-panel">
      <div class="term-head">
        <span>stdout</span>
      </div>
      <div class="term-body" id="logsContainer">
        <div class="log-line">
          <span class="t-time">[System]</span>
          <span class="l-info">INFO</span> 
          <span class="t-msg">Waiting for incoming POST /api/webhook requests...</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const logsContainer = document.getElementById('logsContainer');

    function getFormattedTime() {
      const now = new Date();
      return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    const eventSource = new EventSource('/api/logs');
    eventSource.onmessage = (event) => {
      const log = JSON.parse(event.data);
      appendLog(log);
      
      if (log.message === 'WhatsApp message sent successfully' || log.message === 'WhatsApp access token is missing. Simulating message send.') {
         appendChat(log.text || 'Simulated API reply via LLM', 'bot');
      }
    };

    function appendLog(log) {
      const time = new Date(log.timestamp).toLocaleTimeString();
      let metaStr = '';
      const { level, message, timestamp, ...meta } = log;
      if (Object.keys(meta).length > 0) {
        metaStr = `<div class="t-meta">${JSON.stringify(meta)}</div>`;
      }

      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `
        <span class="t-time">[${time}]</span>
        <span class="l-${level}">${level.toUpperCase()}</span> 
        <span class="t-msg">${message}</span>
        ${metaStr}
      `;
      logsContainer.appendChild(line);
      logsContainer.scrollTop = logsContainer.scrollHeight;
    }

    function appendChat(text, sender) {
      const div = document.createElement('div');
      div.className = `message msg-${sender}`;
      div.innerHTML = `${text.replace(/\n/g, '<br>')} <span class="msg-time">${getFormattedTime()}</span>`;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      messageInput.value = '';
      
      appendChat(text, 'user');
      
      const payload = {
        object: 'whatsapp_business_account',
        entry: [{
          changes: [{
            value: {
              metadata: { phone_number_id: '1234567890' },
              messages: [{ from: '919876543210', text: { body: text } }]
            }
          }]
        }]
      };

      try {
        await fetch('/api/webhook', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (e) {
        console.error(e);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
